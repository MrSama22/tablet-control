<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroDroid Remote Control</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Remote Control</h1>
            <p>Control de dispositivo vía MacroDroid</p>
        </header>

        <section class="control-panel">
            <h2>Volumen</h2>

            <div class="slider-container">
                <div class="slider-header">
                    <span>Nivel</span>
                    <span id="volumeValue">50%</span>
                </div>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" class="slider">
            </div>

            <div class="button-group single-btn">
                <button id="btnMute" class="btn btn-danger">🔇 Mutear</button>
            </div>
        </section>

        <section class="control-panel">
            <h2>Aplicaciones</h2>
            <div class="button-group">
                <button id="btnSpotify" class="btn btn-primary btn-large">🎵 Abrir Spotify Reproductor</button>
                <button id="btnClock" class="btn btn-accent btn-large">⏰ Abrir Reloj</button>
                <button id="btnPomodoro" class="btn btn-pomodoro btn-large">🍅 Iniciar Pomodoro</button>
            </div>
        </section>

        <section class="control-panel">
            <h2>Pantalla</h2>
            <div class="button-group">
                <button id="btnTurnOn" class="btn btn-warning btn-large">☀️ Encender Pantalla</button>
                <button id="btnTurnOff" class="btn btn-dark btn-large">🌙 Apagar Pantalla</button>
            </div>
        </section>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>

</html>
